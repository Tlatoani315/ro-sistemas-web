<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mensaje enviado con éxito. Gracias por contactar a CAOMI Sistemas Informáticos y Grupo RO+.">
    <title>Mensaje Enviado con Éxito | CAOMI - RO+</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos específicos y refinados para la página de confirmación */
        .confirm-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            z-index: 5;
            background-color: var(--bg-main);
        }

        .confirm-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            animation: card-appear 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes card-appear {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Checkmark animado estilo neón */
        .success-icon-wrapper {
            width: 80px;
            height: 80px;
            background-color: rgba(0, 230, 118, 0.06);
            border: 1px solid rgba(0, 230, 118, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.05);
            animation: pulse-success 2s infinite;
        }

        .success-icon-wrapper svg {
            width: 40px;
            height: 40px;
            stroke: var(--accent);
            stroke-width: 2.5;
        }

        @keyframes pulse-success {
            0%, 100% {
                box-shadow: 0 0 20px rgba(0, 230, 118, 0.05);
                border-color: rgba(0, 230, 118, 0.3);
            }
            50% {
                box-shadow: 0 0 35px rgba(0, 230, 118, 0.2);
                border-color: rgba(0, 230, 118, 0.6);
            }
        }

        .confirm-card h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #ffffff 60%, #a3a8b4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .confirm-card p {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .confirm-actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .confirm-actions .btn {
            width: 100%;
            max-width: 320px;
        }

        .download-notice {
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <main>
        <section class="confirm-section">
            <!-- Raycast Glow Background -->
            <div class="hero-glow-bg">
                <div class="glow-beam beam-1" style="width: 200px; height: 200px; background: radial-gradient(circle, rgba(0,230,118,0.15) 0%, rgba(0,0,0,0) 70%);"></div>
            </div>

            <div class="confirm-card">
                <div class="success-icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <h1>¡Mensaje Enviado!</h1>
                <p>Tu solicitud ha sido recibida con éxito. Nos pondremos en contacto contigo en breve a través de los datos proporcionados.</p>
                
                <div class="confirm-actions">
                    <a href="catalogo.pdf" download class="btn btn-primary">
                        Descargar Catálogo de Servicios (PDF)
                    </a>
                    <a href="index.html" class="btn btn-secondary">
                        Volver al Inicio
                    </a>
                </div>
                <div class="download-notice">
                    El archivo se guardará automáticamente en tu dispositivo.
                </div>
            </div>
        </section>
    </main>
</body>
</html>
